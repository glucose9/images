<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
  }
  img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
  }
  .text {
    margin-top: 20px;
    font-size: 2rem;
    font-weight: bold;
    color: #333;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
</style>
</head>
<body>
<img id="randomImg" alt="image">
<div id="caption" class="text"></div>
<script>
  const losers = [
    "img1.png","img2.png","img3.png","img4.png","img5.png",
    "img6.png","img7.png","img8.png","img9.png","img10.png",
    "img11.png","img12.png","img13.png","img14.png","img15.png",
    "img16.png","img20.png"
  ];
  const all = losers;
  const pick = all[Math.floor(Math.random() * all.length)];
  document.getElementById("randomImg").src = pick;
  {
    const messages = [
      "어머나 아쉽당 꽝이네요~",
      "설마 맞을 줄 알았어요?",
      "나 달구아닌데~~",
      "응 꽝이야~ ㅅㄱ",
      "만우절이다 바보야~~ 이걸 왜속누 ~~",
      "카컄ㅋㅋㅋ카카캬카카 이걸 속아??!?!! 으휴 순진한 자식",
      "축하드립니다! 당신은 5초를 버리셨습니다.",
      "그렇게 쉽게 상품을 얻으려 했다고? 심보 너무 아쉬워~~",
      "세상에 공짜 없다 연금술의 기본은 [등가교환]이다!!",
      "만우절이 --으로 보이냐?",
      "공부나 해라..",
      "ㅋ"
    ];
    const msg = messages[Math.floor(Math.random() * messages.length)];
    document.getElementById("caption").textContent = msg;
  }
</script>
</body>
</html>
