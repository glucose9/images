<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
  }
  img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
  }
  .text {
    margin-top: 20px;
    font-size: 2rem;
    font-weight: bold;
    color: #333;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
</style>
</head>
<body>
<img id="randomImg" alt="image">
<div id="caption" class="text"></div>
<script>
  const losers = [
    "img1.png","img2.png","img3.png","img4.png","img5.png",
    "img6.png","img7.png","img8.png","img9.png","img10.png",
    "img11.png","img12.png","img13.png","img14.png","img15.png",
    "img16.png"
  ];
  const winners = ["img20.png"];
  const all = losers.concat(winners);
  const pick = all[Math.floor(Math.random() * all.length)];
  document.getElementById("randomImg").src = pick;
  if (losers.includes(pick)) {
    document.getElementById("caption").textContent = "꽝이네요ㅜㅜ";
  }
</script>
</body>
</html>
